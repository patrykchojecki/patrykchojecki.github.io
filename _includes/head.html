{% include base_path %}

<meta charset="utf-8">

<!-- Theme: apply before stylesheet to prevent flash of unstyled content -->
{% include theme-bootstrap.html %}

<!-- SEO -->
{% include seo.html %}

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">
<link rel="manifest" href="{{ base_path }}/images/manifest.json">

<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<meta name="referrer" content="strict-origin-when-cross-origin">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
</script>

<!-- For all browsers -->
{% assign asset_version = site.github.build_revision | default: site.asset_version %}
{% unless asset_version %}{% assign asset_version = site.time | date: '%s' %}{% endunless %}
<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css?v={{ asset_version }}">

<meta name="theme-color" content="#de7536">
<script>
  (function () {
    var meta = document.querySelector('meta[name="theme-color"]');
    var theme = document.documentElement.getAttribute('data-theme');
    if (meta && theme === 'dark') {
      meta.setAttribute('content', '#141414');
    }
  }());
</script>
